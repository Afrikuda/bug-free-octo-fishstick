<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Afrikuda Consulting</title>
  <meta name="description" content="Thank you for getting in touch with Afrikuda Consulting.">
  <link rel="canonical" href="https://afrikuda.com/thank-you.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#F7F3EC; --charcoal:#1E1E1E; --accent:#8A6918; --white:#FFFFFF; --muted:#645B4F;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:'DM Sans', sans-serif;
      background:var(--cream);
      color:var(--charcoal);
      line-height:1.7;
    }
    .wrap {
      max-width:720px;
      background:var(--white);
      padding:56px 40px;
      border-radius:12px;
      text-align:center;
    }
    h1 {
      font-family:'Playfair Display', serif;
      font-size:clamp(34px, 6vw, 56px);
      margin-bottom:18px;
    }
    p {
      color:var(--muted);
      margin-bottom:14px;
    }
    a {
      display:inline-block;
      margin-top:12px;
      background:var(--accent);
      color:var(--white);
      text-decoration:none;
      padding:14px 22px;
      border-radius:999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Thank you.</h1>
    <p>Thanks so much for getting in touch.</p>
    <p>We’ll take a look and be in touch soon to discuss further.</p>
    <p style="margin-top:22px;">If you would prefer to book a call now, you can do that here.</p>
    <a href="https://cal.com/afrikuda/free-15-minute-consultation" target="_blank" rel="noopener" style="margin-right:12px;">Book a free 15-minute consultation</a>
    <a href="/" style="background:transparent; color:var(--accent); border:1px solid var(--accent);">Return to site</a>
  </div>
</body>
</html>
